<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" role="img" aria-label="An Agent Cartridge: a game-cartridge-shaped artifact with a signed ROM chip, a field-learned SAVE battery, a skill row, and a provable level badge." font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0b3f3a"/>
    </linearGradient>
    <linearGradient id="label" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- cartridge body -->
  <g filter="url(#soft)">
    <path d="M60 20
             h230 a14 14 0 0 1 14 14 v16 h26 a20 20 0 0 1 20 20 v176 a20 20 0 0 1 -20 20
             H60 a20 20 0 0 1 -20 -20 V40 a20 20 0 0 1 20 -20 z"
          fill="url(#body)" stroke="#134e4a" stroke-width="2"/>
    <!-- top grip ridges -->
    <g fill="#0b3f3a" opacity="0.7">
      <rect x="316" y="60" width="34" height="4" rx="2"/>
      <rect x="316" y="70" width="34" height="4" rx="2"/>
      <rect x="316" y="80" width="34" height="4" rx="2"/>
    </g>
    <!-- notched corner (insertion key, like a real cartridge) -->
    <path d="M290 20 v16 a14 14 0 0 0 14 14 h-14 z" fill="#0b3f3a"/>

    <!-- label -->
    <rect x="60" y="70" width="228" height="200" rx="12" fill="url(#label)" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- label header: name + spec -->
    <text x="76" y="98" font-size="15" font-weight="700" fill="#0f172a">Scenario Research Designer</text>
    <text x="76" y="116" font-size="10.5" fill="#475569">agent-cartridge &#183; .acx &#183; spec 0.1</text>

    <!-- provable level badge -->
    <g transform="translate(232,84)">
      <circle r="30" fill="url(#badge)"/>
      <circle r="30" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
      <text y="-2" text-anchor="middle" font-size="20" font-weight="800" fill="#083344">29</text>
      <text y="13" text-anchor="middle" font-size="8" font-weight="700" fill="#083344" letter-spacing="0.5">PRINCIPAL</text>
    </g>

    <!-- ROM / SAVE split -->
    <g transform="translate(76,132)">
      <rect x="0" y="0" width="196" height="40" rx="8" fill="#ecfeff" stroke="#a5f3fc"/>
      <text x="12" y="17" font-size="10" font-weight="700" fill="#0e7490">◆ ROM &#183; signed</text>
      <text x="12" y="31" font-size="8.5" fill="#155e63">skills &#183; capabilities &#183; loop policy &#183; identity</text>
    </g>
    <g transform="translate(76,178)">
      <rect x="0" y="0" width="196" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <!-- little save battery -->
      <g transform="translate(12,12)" fill="#64748b">
        <rect x="0" y="2" width="16" height="12" rx="2"/><rect x="16" y="5" width="2" height="6"/>
        <rect x="2" y="4" width="8" height="8" rx="1" fill="#94a3b8"/>
      </g>
      <text x="34" y="17" font-size="10" font-weight="700" fill="#475569">▢ SAVE &#183; field-learned</text>
      <text x="34" y="31" font-size="8.5" fill="#64748b">codebase memory &#183; strippable before re-share</text>
    </g>

    <!-- skill chips -->
    <g transform="translate(76,228)" font-size="8.5" font-weight="600">
      <g fill="#0f766e">
        <rect x="0" y="0" width="58" height="18" rx="9" fill="#ccfbf1"/><text x="29" y="12.5" text-anchor="middle">build-dag</text>
        <rect x="64" y="0" width="46" height="18" rx="9" fill="#ccfbf1"/><text x="87" y="12.5" text-anchor="middle">airflow</text>
        <rect x="116" y="0" width="52" height="18" rx="9" fill="#ccfbf1"/><text x="142" y="12.5" text-anchor="middle">snowflake</text>
        <rect x="172" y="0" width="24" height="18" rx="9" fill="#ccfbf1"/><text x="184" y="12.5" text-anchor="middle">dbt</text>
      </g>
    </g>
  </g>

  <!-- signed seal -->
  <g transform="translate(300,250)" opacity="0.95">
    <circle r="16" fill="#0891b2"/>
    <path d="M-6 0 l4 4 l8 -9" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text y="27" text-anchor="middle" font-size="7.5" font-weight="700" fill="#0e7490">ed25519</text>
  </g>
</svg>
