<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" role="img" aria-label="A team roster shown as a shelf of three agent cartridges: an Engineer at level 29 (principal), an Architect at level 22 (staff), and a Reviewer at level 15 (senior) — a company of agents you staff onto projects." font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="rbody" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f766e"/><stop offset="1" stop-color="#0b3f3a"/></linearGradient>
    <linearGradient id="rbadge" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient>
    <filter id="rsoft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>

  <!-- one mini cartridge, parameterized by group transforms -->
  <g filter="url(#rsoft)">
    <!-- Engineer -->
    <g transform="translate(24,26)">
      <path d="M0 14 h96 a10 10 0 0 1 10 10 v8 h14 a12 12 0 0 1 12 12 v112 a12 12 0 0 1 -12 12 H0 a12 12 0 0 1 -12 -12 V26 a12 12 0 0 1 12 -12 z" fill="url(#rbody)" stroke="#134e4a" stroke-width="1.5"/>
      <rect x="6" y="44" width="118" height="118" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
      <text x="16" y="64" font-size="11" font-weight="700" fill="#0f172a">Engineer</text>
      <text x="16" y="79" font-size="8" fill="#475569">backend &#183; postgres</text>
      <g transform="translate(95,74)"><circle r="20" fill="url(#rbadge)"/><text y="-1" text-anchor="middle" font-size="14" font-weight="800" fill="#083344">29</text><text y="10" text-anchor="middle" font-size="5.5" font-weight="700" fill="#083344">PRINCIPAL</text></g>
      <rect x="16" y="92" width="108" height="15" rx="7" fill="#ecfeff" stroke="#a5f3fc"/><text x="24" y="102.5" font-size="8" font-weight="700" fill="#0e7490">◆ ROM signed</text>
      <rect x="16" y="112" width="108" height="15" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/><text x="24" y="122.5" font-size="8" font-weight="700" fill="#475569">▢ SAVE learned</text>
      <g transform="translate(16,133)" font-size="7" font-weight="600" fill="#0f766e"><rect width="44" height="14" rx="7" fill="#ccfbf1"/><text x="22" y="10" text-anchor="middle">api-design</text><rect x="48" width="40" height="14" rx="7" fill="#ccfbf1"/><text x="68" y="10" text-anchor="middle">migrate</text></g>
    </g>

    <!-- Architect -->
    <g transform="translate(216,26)">
      <path d="M0 14 h96 a10 10 0 0 1 10 10 v8 h14 a12 12 0 0 1 12 12 v112 a12 12 0 0 1 -12 12 H0 a12 12 0 0 1 -12 -12 V26 a12 12 0 0 1 12 -12 z" fill="url(#rbody)" stroke="#134e4a" stroke-width="1.5"/>
      <rect x="6" y="44" width="118" height="118" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
      <text x="16" y="64" font-size="11" font-weight="700" fill="#0f172a">Architect</text>
      <text x="16" y="79" font-size="8" fill="#475569">systems &#183; DAGs</text>
      <g transform="translate(95,74)"><circle r="20" fill="url(#rbadge)"/><text y="-1" text-anchor="middle" font-size="14" font-weight="800" fill="#083344">22</text><text y="10" text-anchor="middle" font-size="6" font-weight="700" fill="#083344">STAFF</text></g>
      <rect x="16" y="92" width="108" height="15" rx="7" fill="#ecfeff" stroke="#a5f3fc"/><text x="24" y="102.5" font-size="8" font-weight="700" fill="#0e7490">◆ ROM signed</text>
      <rect x="16" y="112" width="108" height="15" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/><text x="24" y="122.5" font-size="8" font-weight="700" fill="#475569">▢ SAVE learned</text>
      <g transform="translate(16,133)" font-size="7" font-weight="600" fill="#0f766e"><rect width="40" height="14" rx="7" fill="#ccfbf1"/><text x="20" y="10" text-anchor="middle">build-dag</text><rect x="44" width="40" height="14" rx="7" fill="#ccfbf1"/><text x="64" y="10" text-anchor="middle">airflow</text></g>
    </g>

    <!-- Reviewer -->
    <g transform="translate(408,26)">
      <path d="M0 14 h96 a10 10 0 0 1 10 10 v8 h14 a12 12 0 0 1 12 12 v112 a12 12 0 0 1 -12 12 H0 a12 12 0 0 1 -12 -12 V26 a12 12 0 0 1 12 -12 z" fill="url(#rbody)" stroke="#134e4a" stroke-width="1.5"/>
      <rect x="6" y="44" width="118" height="118" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
      <text x="16" y="64" font-size="11" font-weight="700" fill="#0f172a">Reviewer</text>
      <text x="16" y="79" font-size="8" fill="#475569">testing &#183; security</text>
      <g transform="translate(95,74)"><circle r="20" fill="url(#rbadge)"/><text y="-1" text-anchor="middle" font-size="14" font-weight="800" fill="#083344">15</text><text y="10" text-anchor="middle" font-size="5.5" font-weight="700" fill="#083344">SENIOR</text></g>
      <rect x="16" y="92" width="108" height="15" rx="7" fill="#ecfeff" stroke="#a5f3fc"/><text x="24" y="102.5" font-size="8" font-weight="700" fill="#0e7490">◆ ROM signed</text>
      <rect x="16" y="112" width="108" height="15" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/><text x="24" y="122.5" font-size="8" font-weight="700" fill="#475569">▢ SAVE learned</text>
      <g transform="translate(16,133)" font-size="7" font-weight="600" fill="#0f766e"><rect width="36" height="14" rx="7" fill="#ccfbf1"/><text x="18" y="10" text-anchor="middle">review</text><rect x="40" width="46" height="14" rx="7" fill="#ccfbf1"/><text x="63" y="10" text-anchor="middle">harden-sec</text></g>
    </g>
  </g>

  <!-- shelf -->
  <rect x="8" y="212" width="544" height="8" rx="4" fill="#0e7490" opacity="0.85"/>
  <text x="280" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Your roster — a company of agents you staff onto projects, each a signed, level-earning cartridge</text>
</svg>
