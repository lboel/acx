<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">ACX Exchange — portable agent teams</title>
  <desc id="description">A share card showing the ACX loop: discover, verify, remix, and share portable agent teams.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041713"/>
      <stop offset="0.58" stop-color="#07352e"/>
      <stop offset="1" stop-color="#075a4c"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="34" fill="url(#background)"/>
  <circle cx="1050" cy="92" r="170" fill="#22d3ee" opacity=".09"/>
  <circle cx="1120" cy="560" r="260" fill="#2dd4bf" opacity=".08"/>
  <path d="M0 510 C260 430 420 600 690 520 S980 420 1200 485 V630 H0Z" fill="#041713" opacity=".48"/>
  <g transform="translate(72 60)">
