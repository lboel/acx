# Builds the Zensical docs plus the validated static ACX Exchange for relevant
# pull requests and pushes. A push to main (or manual dispatch) additionally
# uploads docs-site/site and deploys the combined output to GitHub Pages.
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "SPEC.md"
      - "docs-site/**"
      - "platform/static/**"
      - "registry/**"
      - "schemas/**"
      - "src/**"
      - "tools/build-registry-index.mjs"
      - "tools/build-static-exchange.mjs"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "SPEC.md"
      - "docs-site/**"
      - "platform/static/**"
      - "registry/**"
      - "schemas/**"
      - "src/**"
      - "tools/build-registry-index.mjs"
      - "tools/build-static-exchange.mjs"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Pull requests only build the static site. The deploy job receives its
# additional Pages permissions only after a push to main or manual dispatch.
permissions:
  contents: read

# Serialize deploys; never cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install pinned documentation builder
        run: python -m pip install zensical==0.0.50

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Build docs site
        working-directory: docs-site
        run: zensical build

      - name: Verify deterministic registry index
        run: |
          node --experimental-sqlite tools/build-registry-index.mjs
          git diff --exit-code -- registry/index.json

      - name: Build static Exchange into docs output
        run: |
          node --experimental-sqlite tools/build-static-exchange.mjs \
            --out docs-site/site/exchange \
            --site-url https://acx.dev/exchange/

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/site

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
