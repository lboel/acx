# Builds the Zensical docs plus the validated static ACX Exchange for relevant
# pull requests and pushes. A push to main (or manual dispatch) additionally
# uploads docs-site/site and deploys the combined output to GitHub Pages.
name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Pull requests only build the static site. The deploy job receives its
# additional Pages permissions only after a push to main or manual dispatch.
# Building every main commit keeps the published standard synchronized with
# release/governance/package changes that may not live under docs-site/.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"

      - name: Install pinned documentation builder
        run: python -m pip install zensical==0.0.50

      - name: Configure Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build docs site
        working-directory: docs-site
        run: zensical build

      - name: Add static social previews to documentation pages
        run: npm run build:docs-social

      - name: Verify deterministic registry index
        run: |
          node --experimental-sqlite tools/build-registry-index.mjs
          git diff --exit-code -- registry/index.json

      - name: Build static Exchange into docs output
        run: |
          node --experimental-sqlite tools/build-static-exchange.mjs \
            --out docs-site/site/exchange \
            --site-url https://lboel.github.io/acx/exchange/

      - name: Verify generated static links
        run: npm run check:site

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs-site/site

  deploy:
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
