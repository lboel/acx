# Builds the Zensical docs site in docs-site/ and hosts it statically on
# GitHub Pages. On every push to main that touches docs-site/**, this installs
# zensical, runs `zensical build` (output -> docs-site/site), then uploads that
# static directory as the Pages artifact and deploys it.
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least-privilege token: Pages deploy needs to write Pages and mint an OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; never cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Zensical
        run: pip install zensical

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build docs site
        working-directory: docs-site
        run: zensical build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
