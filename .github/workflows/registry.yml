# Registry verification gate + index regeneration.
#
# tools/build-registry-index.mjs opens and cryptographically verifies EVERY
# cartridge under registry/cartridges/**, workflow under registry/cals/**,
# and Agent Graph under registry/graphs/**
# (Ed25519 signature, tamper check, artifact-profile validation), then writes registry/index.json
# (schemaVersion acx.registry-index/1). It exits non-zero on any tampered,
# invalid, or unclean cartridge — so this job IS the gate: a bad push or PR
# fails CI and can never be indexed.
#
# Contributors regenerate registry/index.json in the same reviewed PR. CI
# first compares the head to the exact PR base and permits only additions at
# canonical signed-artifact paths; lifecycle changes use status.json. It then
# rebuilds the index and fails if the committed bytes differ. CI never writes.
name: Registry

on:
  push:
    branches: [main]
    paths:
      - "registry/**"
      - "tools/**"
      - "src/cal.mjs"
      - "src/workflow.mjs"
      - "src/agent-graph.mjs"
      - "src/level/resolution.mjs"
      - "src/packagespec.mjs"
      - "src/registry-status.mjs"
      - "src/share.mjs"
      - "src/sign.mjs"
      - "src/trust.mjs"
      - "schemas/cal*.json"
      - "schemas/agent-graph.schema.json"
      - "schemas/registry-*.json"
      - ".github/workflows/registry.yml"
  pull_request:
    branches: [main]
    paths:
      - "registry/**"
      - "tools/**"
      - "src/cal.mjs"
      - "src/workflow.mjs"
      - "src/agent-graph.mjs"
      - "src/level/resolution.mjs"
      - "src/packagespec.mjs"
      - "src/registry-status.mjs"
      - "src/share.mjs"
      - "src/sign.mjs"
      - "src/trust.mjs"
      - "schemas/cal*.json"
      - "schemas/agent-graph.schema.json"
      - "schemas/registry-*.json"
      - ".github/workflows/registry.yml"

permissions:
  contents: read

# Keep registry verification runs serialized for an easy-to-audit gate history.
concurrency:
  group: registry-index
  cancel-in-progress: false

jobs:
  verify-and-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Require append-only immutable artifact coordinates
        if: github.event_name == 'pull_request'
        run: node tools/check-registry-immutability.mjs --base "${{ github.event.pull_request.base.sha }}"

      # THE GATE: verifies every cartridge, workflow, and Agent Graph, then
      # regenerates deterministic registry/index.json. Non-zero exits fail.
      - name: Verify ACX artifacts and build registry index
        run: node --experimental-sqlite tools/build-registry-index.mjs

      - name: Require the reviewed deterministic index
        run: git diff --exit-code -- registry/index.json
