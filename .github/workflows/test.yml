# Runs the zero-dependency conformance suite and the end-to-end proofs on every push/PR.
name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          # Exercise the documented engine floor. Docs/registry builds also run
          # against the current Node 22 line in their independent workflows.
          node-version: "22.5.0"
      - name: Conformance test suite
        run: npm test
      - name: Smoke (export → verify → strip → tamper)
        run: node --experimental-sqlite scripts/smoke.mjs
      - name: Provable level (earn + verify)
        run: node --experimental-sqlite scripts/prove-level.mjs
      - name: Registry gate is reproducible
        run: |
          node --experimental-sqlite tools/build-registry-index.mjs
          git diff --exit-code -- registry/index.json
      - name: Packed npm CLI is installable
        run: npm run smoke:package
